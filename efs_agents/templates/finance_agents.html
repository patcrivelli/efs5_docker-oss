<script>
  function initTasksModal(root) {
    if (!root) return;
  
    const runButton      = root.querySelector("#run-agent-button");
    const reportTextarea = root.querySelector("#agent-report");
    const reportHtml     = root.querySelector("#agent-report-html");
    const toggleBtn      = root.querySelector("#toggle-report-view");
    const taskCards      = root.querySelectorAll(".task-card");
  
    // editor + toolbar + pdf
    const editBtn        = root.querySelector("#toggle-edit");
    const toolbar        = root.querySelector("#report-toolbar");
    const pdfBtn         = root.querySelector("#download-pdf");
    let isEditing        = false;
  
    // --- table renderer: convert "a | b | c" blocks into <table> -----------
    function renderReportToHtml(text) {
      const blocks = String(text || "").split(/\n{2,}/);
      const frag = document.createDocumentFragment();
  
      const tableish = (lines) => {
        const withPipes = lines.filter(l => /\|/.test(l));
        if (withPipes.length < 2) return false;
        const counts = withPipes.map(l => l.split("|").length);
        const mode = counts.slice().sort((a,b)=>a-b)[Math.floor(counts.length/2)];
        const agree = counts.filter(c => c === mode).length / counts.length;
        return agree >= 0.6;
      };
      const toRowCells = (line) => line.split("|").map(c => c.trim());
  
      blocks.forEach(block => {
        const lines = block.split("\n").map(l => l.replace(/\s+$/,""));
        if (tableish(lines)) {
          const headerIdx = lines.findIndex(l => /\|/.test(l) && l.trim());
          const headerCells = toRowCells(lines[headerIdx]);
          const tbodyLines = lines.slice(headerIdx + 1).filter(l => l.trim() && /\|/.test(l));
  
          const table = document.createElement("table");
          const thead = document.createElement("thead");
          const trh = document.createElement("tr");
          headerCells.forEach(h => { const th = document.createElement("th"); th.textContent = h; trh.appendChild(th); });
          thead.appendChild(trh);
          table.appendChild(thead);
  
          const tbody = document.createElement("tbody");
          tbodyLines.forEach(l => {
            const tr = document.createElement("tr");
            toRowCells(l).forEach((cell) => {
              const td = document.createElement("td");
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          frag.appendChild(table);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = block;
          frag.appendChild(pre);
        }
      });
  
      if (reportHtml) {
        reportHtml.innerHTML = "";
        reportHtml.appendChild(frag);
      }
    }
  
    // turn simple HTML back into raw text
    function htmlToRawText(el) {
      if (!el) return "";
      const clone = el.cloneNode(true);
  
      // tables -> text blocks
      clone.querySelectorAll("table").forEach(table => {
        const rows = [];
        const headRow = table.querySelectorAll("thead tr th");
        if (headRow.length) {
          rows.push(Array.from(headRow).map(th => th.textContent.trim()).join(" | "));
        }
        table.querySelectorAll("tbody tr").forEach(tr => {
          const cells = Array.from(tr.children).map(td => td.textContent.trim());
          rows.push(cells.join(" | "));
        });
        const pre = document.createElement("pre");
        pre.textContent = rows.join("\n");
        table.replaceWith(pre);
      });
  
      // <br> -> \n
      clone.querySelectorAll("br").forEach(br => br.replaceWith("\n"));
  
      // block elements -> separated lines
      const blockTags = new Set(["P","DIV","H1","H2","H3","H4","H5","H6","LI","PRE"]);
      function textWalk(node) {
        let out = "";
        node.childNodes.forEach(n => {
          if (n.nodeType === Node.TEXT_NODE) {
            out += n.nodeValue;
          } else if (n.nodeType === Node.ELEMENT_NODE) {
            const before = blockTags.has(n.tagName) ? "\n" : "";
            const inner = textWalk(n);
            const after  = blockTags.has(n.tagName) ? "\n" : "";
            out += before + inner + after;
          }
        });
        return out;
      }
      return textWalk(clone).replace(/\n{3,}/g, "\n\n").trim();
    }
  
    // toggle raw <-> formatted
    function setView(mode) {
      const showFormatted = mode === "formatted";
      if (reportHtml) reportHtml.hidden = !showFormatted;
      if (reportTextarea) reportTextarea.hidden = showFormatted;
      if (toggleBtn) toggleBtn.textContent = showFormatted ? "Raw text view" : "Formatted view";
  
      // editing button only meaningful in formatted view
      if (editBtn) {
        editBtn.disabled = !showFormatted;
      }
      if (showFormatted) {
        renderReportToHtml(reportTextarea?.value || "");
      } else {
        // switching to raw: capture edits back to text if needed
        if (isEditing && reportHtml) {
          const raw = htmlToRawText(reportHtml);
          if (raw) reportTextarea.value = raw;
        }
        if (isEditing) toggleEditing(false);
      }
    }
  
    toggleBtn?.addEventListener("click", () => {
      setView(reportHtml?.hidden ? "formatted" : "raw");
    });
  
    // keep formatted view synced if the text changes
    reportTextarea?.addEventListener("input", () => {
      if (!reportHtml?.hidden) renderReportToHtml(reportTextarea.value);
    });
  
    // editing controls
    function toggleEditing(enable) {
      isEditing = !!enable;
      if (reportHtml) {
        reportHtml.contentEditable = isEditing ? "true" : "false";
        reportHtml.classList.toggle("editing", isEditing);
      }
      if (toolbar) toolbar.hidden = !isEditing;
      if (editBtn) editBtn.textContent = isEditing ? "Disable editing" : "Enable editing";
    }
  
    editBtn?.addEventListener("click", () => {
      if (reportHtml?.hidden) setView("formatted");
      toggleEditing(!isEditing);
    });
  
    // toolbar via execCommand
    toolbar?.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const cmd = btn.dataset.cmd;
      const fmt = btn.dataset.format;
      if (cmd) { document.execCommand(cmd, false, null); return; }
      if (fmt) {
        const block = fmt === "p" ? "P" : fmt.toUpperCase();
        document.execCommand("formatBlock", false, block);
      }
    });
  
    // clear formatting button
    const clearBtn = root.querySelector("#clear-formatting");
    clearBtn?.addEventListener("click", () => {
      if (!window.getSelection) return;
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const text = range.toString();
      range.deleteContents();
      range.insertNode(document.createTextNode(text));
    });
  
    // download PDF
    pdfBtn?.addEventListener("click", async () => {
      if (reportHtml?.hidden) setView("formatted");
      try {
        if (window.html2pdf) {
          const opt = {
            margin:       10,
            filename:     `analysis-${(root.querySelector("#tx-span")?.textContent || "report").trim()}.pdf`,
            image:        { type: "jpeg", quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: "mm", format: "a4", orientation: "portrait" }
          };
          await window.html2pdf().set(opt).from(reportHtml).save();
        } else {
          const w = window.open("", "_blank");
          if (!w) return;
          w.document.write(`
            <html>
              <head>
                <title>Report</title>
                <style>
                  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 16px; }
                  ${document.querySelector("style")?.innerHTML || ""}
                </style>
              </head>
              <body>${reportHtml.outerHTML}</body>
            </html>
          `);
          w.document.close();
          w.focus();
          w.print();
          w.close();
        }
      } catch (err) {
        alert("Could not generate PDF: " + (err?.message || err));
      }
    });
  
    // ===== existing logic ====================================================
  
    // ABN + TX extraction
    const abnRaw = root.querySelector(".info-bar")?.dataset.abn || "";
    const abn = (abnRaw || "").normalize("NFKC").replace(/\D+/g, "");
    function getParam(name){ const m = new RegExp(`[?&]${name}=([^&]*)`).exec(window.location.search); return m ? decodeURIComponent(m[1]) : ""; }
    function looksLikeUUID(v){ return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test((v||"").trim()); }
  
    let txId = (root.querySelector(".info-bar")?.dataset.tx || "").normalize("NFKC").trim();
    if (!looksLikeUUID(txId)) {
      const spanVal = (root.querySelector("#tx-span")?.textContent || "").trim();
      if (looksLikeUUID(spanVal)) txId = spanVal;
    }
    if (!looksLikeUUID(txId)) {
      const q = getParam("tx");
      if (looksLikeUUID(q)) txId = q;
    }
    const txSpan = root.querySelector("#tx-span");
    if (txSpan && !txSpan.textContent.trim()) txSpan.textContent = txId || "—";
  
   
    const kindMap = {
      "agent-1": "data_checklist",
      "agent-2": "financial",
      "agent-3": "bureau",
      "agent-4": "ppsr",
      "agent-5": "bank",
      "agent-6": "compliance",
      "agent-7": "net_asset_value",
      "agent-8": "deal_workshop",
      "agent-9": "initial_offer"
    };
  
    // initial state of edit button
    if (editBtn) editBtn.disabled = !reportHtml || !reportHtml.hidden ? false : true;
  
    // toggle state per tile
    // toggle state per tile (✅ always uses the tile toggle, not any other checkbox)
    taskCards.forEach(card => {
      const toggleSwitch = card.querySelector('input[type="checkbox"][data-toggle-for]'); // ✅
      const agentSelect  = card.querySelector('select[id^="agent-"]');

      if (toggleSwitch && !toggleSwitch.checked) {
        card.classList.add('disabled');
        if (agentSelect) agentSelect.disabled = true;
      }

      toggleSwitch?.addEventListener('change', function () {
        const isEnabled = this.checked;
        card.classList.toggle('disabled', !isEnabled);
        if (agentSelect) {
          agentSelect.disabled = !isEnabled;
          if (!isEnabled) agentSelect.value = "";
        }
      });
    });

  
    if (!runButton || !reportTextarea) return;
  
    const RUN_AGENT_URL = "/run-agent-analysis/"; // same-origin Sales BFF
  
    // run button: fetch sections and append to report
    runButton.addEventListener("click", async function () {
      // If editing, preserve user content: copy edited HTML back to text first
      if (!reportHtml?.hidden && isEditing) {
        const raw = htmlToRawText(reportHtml);
        if (raw) reportTextarea.value = raw;
        toggleEditing(false);
      }
  
      reportTextarea.value = "⏳ Running agents...\n";
  
      // collect selected tasks
      const tasksToRun = [];
      root.querySelectorAll(".task-card").forEach(card => {
        const dropdown = card.querySelector('select[id^="agent-"]');
        const toggle   = card.querySelector('input[type="checkbox"][data-toggle-for]');
        if (!dropdown || !toggle) return;
        if (!toggle.checked) return;
        if (!dropdown.value) return;
  
        const dropdownId = dropdown.id;
        const label = card.querySelector("h4")?.innerText?.trim() || `Ticket ${dropdownId}`;
        const kind  = kindMap[dropdownId] || "";
        if (!kind) return;
  
        tasksToRun.push({
          agent_id: dropdown.value,
          endpoint: RUN_AGENT_URL,
          ticket_label: label,
          kind,
        });
      });
  
      if (tasksToRun.length === 0) {
        alert("Please enable at least one tile and select an agent.");
        reportTextarea.value = "";
        return;
      }
  
      const needsTx = tasksToRun.some(t => t.kind === "ppsr");
      const txOK    = looksLikeUUID(txId);
      const abnOK   = abn.length === 11;
  
      if (needsTx && !txOK) {
        alert("❌ PPSR requires a valid Transaction ID.");
        reportTextarea.value = "❌ Error: PPSR requires a valid TX.";
        return;
      }
      if (!txOK && !abnOK) {
        alert("❌ Provide a valid ABN or Transaction ID.");
        reportTextarea.value = "❌ Error: Need ABN or TX.";
        return;
      }
  
      // run tasks sequentially
      reportTextarea.value = `⏳ Running ${tasksToRun.length} agent(s) sequentially...\n\n`;
  
      // compute once (recommended) before the loop:
      const includeLinked = !!root.querySelector("#global-linked-entities-switch")?.checked;

      for (const task of tasksToRun) {
        try {
          const resp = await fetch(task.endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCookie("csrftoken"),
            },
            body: JSON.stringify({
              agent_id: task.agent_id,
              ticket_label: task.ticket_label,
              kind: task.kind,
              abn,
              transaction_id: txId,

              // ✅ NEW: pass toggle through to efs_agents
              include_linked_entities: includeLinked,
            }),
          });

          if (!resp.ok) {
            const text = await resp.text();
            reportTextarea.value += `❌ ${task.ticket_label} failed: HTTP ${resp.status}: ${text}\n\n`;
            continue;
          }

          const data = await resp.json();
          const block = data.report || ("⚠️ " + (data.error || "Unknown error"));
          reportTextarea.value += `=== ${task.ticket_label} ===\n${block}\n\n`;
        } catch (e) {
          reportTextarea.value += `❌ ${task.ticket_label} failed: ${(e && e.message) || e}\n\n`;
        }
      }

  
      // update formatted view once
      if (!reportHtml?.hidden) {
        renderReportToHtml(reportTextarea.value);
      }
    });
  
    // get cookie helper
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }

    
  // === AGENTS BUTTON: generate polished credit report via Gemini ==========
// === AGENTS BUTTON: generate polished credit report via Gemini ==========
const agentsBtn = root.querySelector("#agents-btn");
agentsBtn?.addEventListener("click", async () => {
  if (!reportHtml?.hidden && isEditing) {
    const raw = htmlToRawText(reportHtml);
    if (raw) reportTextarea.value = raw;
    toggleEditing(false);
  }

  const baseReport = (reportTextarea?.value || "").trim();
  if (!baseReport) {
    alert("Run or paste content into the Report area first.");
    return;
  }

  const includeLinked = !!root.querySelector("#global-linked-entities-switch")?.checked;

  const txOK  = looksLikeUUID(txId);
  const abnOK = (abn || "").length === 11;
  if (!txOK && !abnOK) {
    alert("❌ Provide a valid ABN or Transaction ID.");
    return;
  }

  reportTextarea.value = "⏳ Generating polished credit report...";
  if (!reportHtml?.hidden) renderReportToHtml(reportTextarea.value);

  try {
    const resp = await fetch(GENERATE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken"),
      },
      body: JSON.stringify({
        abn,
        transaction_id: txId,
        report: baseReport,
        include_linked_entities: includeLinked,
        agent_id: null
      })
    });

    if (!resp.ok) {
      const text = await resp.text();
      reportTextarea.value = `❌ Failed to generate report: HTTP ${resp.status}: ${text}`;
    } else {
      const payload = await resp.json();
      reportTextarea.value = (payload.report || "").trim() || "⚠️ Gemini returned no content.";
    }
  } catch (e) {
    reportTextarea.value = `❌ Error generating report: ${(e && e.message) || e}`;
  }

  if (!reportHtml?.hidden) renderReportToHtml(reportTextarea.value);
});
}

  </script>

  document.addEventListener("DOMContentLoaded", () => {
    const modalRoot = document.querySelector(".modal-content");
    initTasksModal(modalRoot);
  });

services:
  db:
    image: postgres:16
    container_name: clientapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clientapp
      POSTGRES_USER: clientapp
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata_clientapp:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientapp -d clientapp"]
      interval: 2s
      timeout: 2s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clientapp-web
    command: >
      bash -lc "
      python manage.py migrate --noinput &&
      (python manage.py collectstatic --noinput || true) &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      POSTGRES_DB: clientapp
      POSTGRES_USER: clientapp
      POSTGRES_PASSWORD: devpassword
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: clientapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: patrick.crivelli@bayescapital.com.au
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_clientapp:

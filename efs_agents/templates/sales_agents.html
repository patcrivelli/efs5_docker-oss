<script>
  // These should already be defined above this script:
  // const GENERATE_URL = "{% url 'efs_agents:agents_generate_report' %}";
  // const SAVE_MEMORY_URL = "/sales/save-agent-memory/";

  function initTasksModal(root) {
    "use strict";
    if (!root) return;

    // -----------------------------
    // Core DOM refs
    // -----------------------------
    const runButton      = root.querySelector("#run-agent-button");
    const reportTextarea = root.querySelector("#agent-report");
    const reportHtml     = root.querySelector("#agent-report-html");
    const toggleBtn      = root.querySelector("#toggle-report-view");
    const taskCards      = root.querySelectorAll(".task-card");

    const editBtn        = root.querySelector("#toggle-edit");
    const toolbar        = root.querySelector("#report-toolbar");
    const pdfBtn         = root.querySelector("#download-pdf");

    let isEditing = false;

    // -----------------------------
    // Helpers
    // -----------------------------
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(";").shift();
      return "";
    }

    function looksLikeUUID(v) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test((v || "").trim());
    }

    function getParam(name) {
      const m = new RegExp(`[?&]${name}=([^&]*)`).exec(window.location.search);
      return m ? decodeURIComponent(m[1]) : "";
    }

    // -----------------------------
    // Compute ABN + TX ONCE (fixes "abn is not defined")
    // -----------------------------
    const infoBar = root.querySelector(".info-bar");

    const abnDigits = (() => {
      const raw = (infoBar?.dataset?.abn || "").normalize("NFKC");
      // keep digits only
      return raw.replace(/\D+/g, "");
    })();

    let txId = (() => {
      // prefer dataset
      let v = (infoBar?.dataset?.tx || "").normalize("NFKC").trim();
      if (looksLikeUUID(v)) return v;

      // then span
      const spanVal = (root.querySelector("#tx-span")?.textContent || "").trim();
      if (looksLikeUUID(spanVal)) return spanVal;

      // then querystring
      const q = getParam("tx");
      if (looksLikeUUID(q)) return q;

      return "";
    })();

    // ensure tx-span displays something
    const txSpan = root.querySelector("#tx-span");
    if (txSpan && !txSpan.textContent.trim()) txSpan.textContent = txId || "—";

    // -----------------------------
    // Kind mapping
    // -----------------------------
    const kindMap = {
      "agent-1": "data_checklist",
      "agent-2": "financial",
      "agent-3": "bureau",
      "agent-4": "ppsr",
      "agent-5": "bank",
      "agent-6": "compliance",
      "agent-7": "net_asset_value",
      "agent-8": "deal_workshop",
      "agent-9": "initial_offer"
    };

    // -----------------------------
    // Render text -> HTML and HTML -> text
    // -----------------------------
    function renderReportToHtml(text) {
      const blocks = String(text || "").split(/\n{2,}/);
      const frag = document.createDocumentFragment();

      const tableish = (lines) => {
        const withPipes = lines.filter(l => /\|/.test(l));
        if (withPipes.length < 2) return false;
        const counts = withPipes.map(l => l.split("|").length);
        const mode = counts.slice().sort((a,b)=>a-b)[Math.floor(counts.length/2)];
        const agree = counts.filter(c => c === mode).length / counts.length;
        return agree >= 0.6;
      };

      const toRowCells = (line) => line.split("|").map(c => c.trim());

      blocks.forEach(block => {
        const lines = block.split("\n").map(l => l.replace(/\s+$/,""));
        if (tableish(lines)) {
          const headerIdx = lines.findIndex(l => /\|/.test(l) && l.trim());
          const headerCells = toRowCells(lines[headerIdx]);
          const tbodyLines = lines.slice(headerIdx + 1).filter(l => l.trim() && /\|/.test(l));

          const table = document.createElement("table");
          const thead = document.createElement("thead");
          const trh = document.createElement("tr");
          headerCells.forEach(h => {
            const th = document.createElement("th");
            th.textContent = h;
            trh.appendChild(th);
          });
          thead.appendChild(trh);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");
          tbodyLines.forEach(l => {
            const tr = document.createElement("tr");
            toRowCells(l).forEach(cell => {
              const td = document.createElement("td");
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);

          frag.appendChild(table);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = block;
          frag.appendChild(pre);
        }
      });

      if (reportHtml) {
        reportHtml.innerHTML = "";
        reportHtml.appendChild(frag);
      }
    }

    function htmlToRawText(el) {
      if (!el) return "";
      const clone = el.cloneNode(true);

      clone.querySelectorAll("table").forEach(table => {
        const rows = [];
        const headRow = table.querySelectorAll("thead tr th");
        if (headRow.length) {
          rows.push(Array.from(headRow).map(th => th.textContent.trim()).join(" | "));
        }
        table.querySelectorAll("tbody tr").forEach(tr => {
          const cells = Array.from(tr.children).map(td => td.textContent.trim());
          rows.push(cells.join(" | "));
        });
        const pre = document.createElement("pre");
        pre.textContent = rows.join("\n");
        table.replaceWith(pre);
      });

      clone.querySelectorAll("br").forEach(br => br.replaceWith("\n"));

      const blockTags = new Set(["P","DIV","H1","H2","H3","H4","H5","H6","LI","PRE"]);
      function textWalk(node) {
        let out = "";
        node.childNodes.forEach(n => {
          if (n.nodeType === Node.TEXT_NODE) {
            out += n.nodeValue;
          } else if (n.nodeType === Node.ELEMENT_NODE) {
            const before = blockTags.has(n.tagName) ? "\n" : "";
            const inner = textWalk(n);
            const after  = blockTags.has(n.tagName) ? "\n" : "";
            out += before + inner + after;
          }
        });
        return out;
      }
      return textWalk(clone).replace(/\n{3,}/g, "\n\n").trim();
    }

    // -----------------------------
    // View toggle (raw <-> formatted)
    // -----------------------------
    function toggleEditing(enable) {
      isEditing = !!enable;
      if (reportHtml) {
        reportHtml.contentEditable = isEditing ? "true" : "false";
        reportHtml.classList.toggle("editing", isEditing);
      }
      if (toolbar) toolbar.hidden = !isEditing;
      if (editBtn) editBtn.textContent = isEditing ? "Disable editing" : "Enable editing";
    }

    function setView(mode) {
      const showFormatted = mode === "formatted";
      if (reportHtml) reportHtml.hidden = !showFormatted;
      if (reportTextarea) reportTextarea.hidden = showFormatted;
      if (toggleBtn) toggleBtn.textContent = showFormatted ? "Raw text view" : "Formatted view";

      if (editBtn) editBtn.disabled = !showFormatted;

      if (showFormatted) {
        renderReportToHtml(reportTextarea?.value || "");
      } else {
        if (isEditing && reportHtml) {
          const raw = htmlToRawText(reportHtml);
          if (raw) reportTextarea.value = raw;
        }
        if (isEditing) toggleEditing(false);
      }
    }

    toggleBtn?.addEventListener("click", () => {
      setView(reportHtml?.hidden ? "formatted" : "raw");
    });

    reportTextarea?.addEventListener("input", () => {
      if (reportHtml && !reportHtml.hidden) renderReportToHtml(reportTextarea.value);
    });

    editBtn?.addEventListener("click", () => {
      if (reportHtml?.hidden) setView("formatted");
      toggleEditing(!isEditing);
    });

    toolbar?.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const cmd = btn.dataset.cmd;
      const fmt = btn.dataset.format;
      if (cmd) { document.execCommand(cmd, false, null); return; }
      if (fmt) {
        const block = fmt === "p" ? "P" : fmt.toUpperCase();
        document.execCommand("formatBlock", false, block);
      }
    });

    root.querySelector("#clear-formatting")?.addEventListener("click", () => {
      const sel = window.getSelection?.();
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const text = range.toString();
      range.deleteContents();
      range.insertNode(document.createTextNode(text));
    });

    // -----------------------------
    // PDF Download
    // -----------------------------
    pdfBtn?.addEventListener("click", async () => {
      if (reportHtml?.hidden) setView("formatted");
      try {
        if (window.html2pdf) {
          const opt = {
            margin: 10,
            filename: `analysis-${(txSpan?.textContent || "report").trim()}.pdf`,
            image: { type: "jpeg", quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
          };
          await window.html2pdf().set(opt).from(reportHtml).save();
        } else {
          const w = window.open("", "_blank");
          if (!w) return;
          w.document.write(`
            <html>
              <head>
                <title>Report</title>
                <style>
                  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 16px; }
                  ${document.querySelector("style")?.innerHTML || ""}
                </style>
              </head>
              <body>${reportHtml.outerHTML}</body>
            </html>
          `);
          w.document.close();
          w.focus();
          w.print();
          w.close();
        }
      } catch (err) {
        alert("Could not generate PDF: " + (err?.message || err));
      }
    });

    // -----------------------------
    // Tile toggle enable/disable
    // -----------------------------
    taskCards.forEach(card => {
      const toggleSwitch = card.querySelector('input[type="checkbox"][data-toggle-for]');
      const agentSelect  = card.querySelector('select[id^="agent-"]');

      if (toggleSwitch && !toggleSwitch.checked) {
        card.classList.add("disabled");
        if (agentSelect) agentSelect.disabled = true;
      }

      toggleSwitch?.addEventListener("change", function () {
        const isEnabled = this.checked;
        card.classList.toggle("disabled", !isEnabled);
        if (agentSelect) {
          agentSelect.disabled = !isEnabled;
          if (!isEnabled) agentSelect.value = "";
        }
      });
    });

    // -----------------------------
    // RUN button (data collection)
    // -----------------------------
    if (!runButton || !reportTextarea) return;

    const RUN_AGENT_URL = "/run-agent-analysis/";

    runButton.addEventListener("click", async () => {
      if (!reportHtml?.hidden && isEditing) {
        const raw = htmlToRawText(reportHtml);
        if (raw) reportTextarea.value = raw;
        toggleEditing(false);
      }

      reportTextarea.value = "⏳ Running agents...\n";

      const tasksToRun = [];
      root.querySelectorAll(".task-card").forEach(card => {
        const dropdown = card.querySelector('select[id^="agent-"]');
        const toggle   = card.querySelector('input[type="checkbox"][data-toggle-for]');
        if (!dropdown || !toggle) return;
        if (!toggle.checked) return;
        if (!dropdown.value) return;

        const dropdownId = dropdown.id;
        const label = card.querySelector("h4")?.innerText?.trim() || `Ticket ${dropdownId}`;
        const kind  = kindMap[dropdownId] || "";
        if (!kind) return;

        tasksToRun.push({
          agent_id: dropdown.value,
          endpoint: RUN_AGENT_URL,
          ticket_label: label,
          kind,
        });
      });

      if (tasksToRun.length === 0) {
        alert("Please enable at least one tile and select an agent.");
        reportTextarea.value = "";
        return;
      }

      const needsTx = tasksToRun.some(t => t.kind === "ppsr");
      const txOK    = looksLikeUUID(txId);
      const abnOK   = (abnDigits || "").length === 11;

      if (needsTx && !txOK) {
        alert("❌ PPSR requires a valid Transaction ID.");
        reportTextarea.value = "❌ Error: PPSR requires a valid TX.";
        return;
      }
      if (!txOK && !abnOK) {
        alert("❌ Provide a valid ABN or Transaction ID.");
        reportTextarea.value = "❌ Error: Need ABN or TX.";
        return;
      }

      reportTextarea.value = `⏳ Running ${tasksToRun.length} task(s) sequentially...\n\n`;

      const includeLinked = !!root.querySelector("#global-linked-entities-switch")?.checked;

      for (const task of tasksToRun) {
        try {
          const resp = await fetch(task.endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCookie("csrftoken"),
            },
            body: JSON.stringify({
              // NOTE: agent_id is ignored by backend for Run, but ok to send
              agent_id: task.agent_id,
              ticket_label: task.ticket_label,
              kind: task.kind,
              abn: abnDigits,
              transaction_id: txId,
              include_linked_entities: includeLinked,
              include_bank_statements_data: task.kind === "bank",
            }),
          });

          if (!resp.ok) {
            const text = await resp.text();
            reportTextarea.value += `❌ ${task.ticket_label} failed: HTTP ${resp.status}: ${text}\n\n`;
            continue;
          }

          const data = await resp.json();
          const block = data.report || ("⚠️ " + (data.error || "Unknown error"));
          reportTextarea.value += `${block}\n\n`;
        } catch (e) {
          reportTextarea.value += `❌ ${task.ticket_label} failed: ${(e && e.message) || e}\n\n`;
        }
      }

      if (reportHtml && !reportHtml.hidden) {
        renderReportToHtml(reportTextarea.value);
      }
    });

    // -----------------------------
    // AGENTS button (LLM report)
    // -----------------------------
    const agentsBtn = root.querySelector("#agents-btn");
    agentsBtn?.addEventListener("click", async () => {
      if (!reportHtml?.hidden && isEditing) {
        const raw = htmlToRawText(reportHtml);
        if (raw) reportTextarea.value = raw;
        toggleEditing(false);
      }

      const baseReport = (reportTextarea?.value || "").trim();
      if (!baseReport) {
        alert("Run or paste content into the Report area first.");
        return;
      }

      const includeLinked = !!root.querySelector("#global-linked-entities-switch")?.checked;

      const txOK  = looksLikeUUID(txId);
      const abnOK = (abnDigits || "").length === 11;
      if (!txOK && !abnOK) {
        alert("❌ Provide a valid ABN or Transaction ID.");
        return;
      }

      // OPTIONAL: choose an agent_id to drive persona + memory.
      // Here we pick the first enabled+selected tile’s agent_id if available; else null.
      let reportAgentId = null;
      for (const card of root.querySelectorAll(".task-card")) {
        const dropdown = card.querySelector('select[id^="agent-"]');
        const toggle   = card.querySelector('input[type="checkbox"][data-toggle-for]');
        if (toggle?.checked && dropdown?.value) {
          reportAgentId = dropdown.value;
          break;
        }
      }

      reportTextarea.value = "⏳ Generating polished credit report...";
      if (reportHtml && !reportHtml.hidden) renderReportToHtml(reportTextarea.value);

      try {
        const resp = await fetch(GENERATE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken"),
          },
          body: JSON.stringify({
            abn: abnDigits,
            transaction_id: txId,
            report: baseReport,
            include_linked_entities: includeLinked,
            agent_id: reportAgentId,          // ✅ will enable persona + memory if you implemented it
            kind: "credit_report",
            ticket_label: "Credit Report",
            // debug_memory: true,            // uncomment if your backend supports debug return
          }),
        });

        if (!resp.ok) {
          const text = await resp.text();
          reportTextarea.value = `❌ Failed to generate report: HTTP ${resp.status}: ${text}`;
        } else {
          const payload = await resp.json();
          reportTextarea.value = (payload.report || "").trim() || "⚠️ Model returned no content.";
        }
      } catch (e) {
        reportTextarea.value = `❌ Error generating report: ${(e && e.message) || e}`;
      }

      if (reportHtml && !reportHtml.hidden) renderReportToHtml(reportTextarea.value);
    });

    // -----------------------------
    // SAVE button (delegated)
    // -----------------------------
    root.addEventListener("click", async (e) => {
      const saveBtn = e.target.closest("#save-report");
      if (!saveBtn) return;
      e.preventDefault();

      const saveStatus = root.querySelector("#save-status");
      if (saveStatus) saveStatus.textContent = "Saving…";

      const reportText = (() => {
        if (reportHtml && !reportHtml.hidden) return (htmlToRawText(reportHtml) || "").trim();
        return (reportTextarea?.value || "").trim();
      })();

      if (!reportText) {
        if (saveStatus) saveStatus.textContent = "";
        alert("Nothing to save — the Report area is empty.");
        return;
      }

      // pick a tile (agent/kind/label)
      const tiles = [];
      root.querySelectorAll(".task-card").forEach(card => {
        const dropdown = card.querySelector('select[id^="agent-"]');
        const toggle   = card.querySelector('input[type="checkbox"][data-toggle-for]');
        if (!dropdown || !toggle) return;
        if (!toggle.checked) return;
        if (!dropdown.value) return;

        const dropdownId = dropdown.id;
        const label = card.querySelector("h4")?.innerText?.trim() || dropdownId;
        const k = kindMap[dropdownId] || "general";
        tiles.push({ ticket_label: label, kind: k, agent_id: dropdown.value });
      });

      if (tiles.length === 0) {
        if (saveStatus) saveStatus.textContent = "";
        alert("To save memory, enable at least one tile and select an agent.");
        return;
      }

      let chosen = tiles[0];
      if (tiles.length > 1) {
        const opts = tiles.map((t, i) => `${i + 1}) ${t.ticket_label} (${t.kind})`).join("\n");
        const pick = prompt(
          `Multiple tasks are enabled.\nWhich one should this Save be recorded under?\n\n${opts}\n\nEnter number:`,
          "1"
        );
        const idx = parseInt(pick || "1", 10) - 1;
        if (Number.isNaN(idx) || idx < 0 || idx >= tiles.length) {
          if (saveStatus) saveStatus.textContent = "";
          alert("Save cancelled (no task selected).");
          return;
        }
        chosen = tiles[idx];
      }

      const txOK  = looksLikeUUID(txId);
      const abnOK = (abnDigits || "").length === 11;
      if (!txOK && !abnOK) {
        if (saveStatus) saveStatus.textContent = "";
        alert("❌ Provide a valid ABN or Transaction ID before saving.");
        return;
      }

      saveBtn.disabled = true;

      try {
        const resp = await fetch(SAVE_MEMORY_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken"),
          },
          body: JSON.stringify({
            agent_id: chosen.agent_id,
            kind: chosen.kind,
            ticket_label: chosen.ticket_label,
            abn: abnDigits,
            transaction_id: txId,
            input_text: "",
            output_text: reportText,
            source: "ui_save_button",
            include_linked_entities: !!root.querySelector("#global-linked-entities-switch")?.checked,
          }),
        });

        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${text}`);
        }

        if (saveStatus) saveStatus.textContent = "Saved ✅";
        setTimeout(() => { if (saveStatus) saveStatus.textContent = ""; }, 2500);
      } catch (err) {
        if (saveStatus) saveStatus.textContent = "";
        alert("Save failed: " + ((err && err.message) || err));
      } finally {
        saveBtn.disabled = false;
      }
    });

    // initial edit button state
    if (editBtn) editBtn.disabled = true;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const modalRoot = document.querySelector(".modal-content");
    initTasksModal(modalRoot);
  });
</script>
